<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Support Me</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

body{
  min-height:100vh;
  overflow:hidden;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== DARK AURAS ===== */
.auras::before,
.auras::after{
  content:"";
  position:absolute;
  width:700px;
  height:700px;
  border-radius:50%;
  filter:blur(160px);
  opacity:.18;
  animation:float 14s ease-in-out infinite;
}

.auras::before{
  background:#2b2b2b;
  left:-200px;
  top:-200px;
}

.auras::after{
  background:#1a1a1a;
  right:-200px;
  bottom:-200px;
  animation-delay:4s;
}

@keyframes float{
  50%{transform:translateY(-60px) scale(1.08);}
}

/* ===== ORBS (VERY SUBTLE) ===== */
.orb{
  position:absolute;
  width:260px;
  height:260px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,.06), transparent 70%);
  filter:blur(60px);
  opacity:.25;
  animation:move 16s infinite ease-in-out;
}

.orb.one{top:12%;left:18%;}
.orb.two{bottom:12%;right:18%;animation-delay:5s;}

@keyframes move{
  50%{transform:translateY(-70px) translateX(50px) scale(1.15);}
}

/* ===== CURSOR LIGHT ===== */
.glow{
  position:fixed;
  width:320px;
  height:320px;
  background:radial-gradient(circle, rgba(255,255,255,.06), transparent 60%);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  filter:blur(20px);
  opacity:.6;
}

/* ===== GLASS CARD (DARK LIQUID GLASS) ===== */
.card{
  position:relative;
  width:min(92%,780px);
  padding:52px;
  border-radius:32px;

  background:rgba(10,10,10,.55);
  border:1px solid rgba(255,255,255,.08);

  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);

  box-shadow:
    0 30px 90px rgba(0,0,0,.9),
    inset 0 1px 0 rgba(255,255,255,.05);

  overflow:hidden;
  animation:fadeUp 1s ease-out;
}

/* subtle reflection */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.06), transparent 45%);
  pointer-events:none;
}

/* ===== TEXT ===== */
h1{
  font-size:52px;
  font-weight:800;
  letter-spacing:-2px;
  line-height:1.05;
  margin-bottom:16px;
}

.subtitle{
  font-size:17px;
  opacity:.65;
  margin-bottom:34px;
  max-width:600px;
  line-height:1.7;
}

/* ===== WALLET ===== */
.wallet{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  padding:24px;
}

.label{
  font-size:11px;
  letter-spacing:2.5px;
  opacity:.45;
  margin-bottom:10px;
}

.address{
  background:rgba(0,0,0,.6);
  padding:14px;
  border-radius:14px;
  font-size:14px;
  word-break:break-all;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,.06);
  color:#ddd;
}

/* ===== BUTTONS ===== */
.buttons{
  display:flex;
  gap:12px;
}

button,a{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:.25s;
  text-decoration:none;
  text-align:center;
}

/* minimal white button */
.copy{
  background:#f2f2f2;
  color:#000;
}

.copy:hover{
  transform:translateY(-3px);
  background:#fff;
}

/* dark neon button */
.pay{
  background:linear-gradient(135deg,#111,#2a2a2a);
  border:1px solid rgba(255,255,255,.12);
  color:#fff;
}

.pay:hover{
  transform:translateY(-3px);
  border-color:rgba(255,255,255,.25);
}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.7);
  border:1px solid rgba(255,255,255,.12);
  padding:12px 18px;
  border-radius:12px;
  opacity:0;
  transition:.35s;
  pointer-events:none;
  color:#fff;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(-8px);
}

/* ===== ANIMATION ===== */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(25px);}
  to{opacity:1; transform:translateY(0);}
}

/* ===== MOBILE ===== */
@media(max-width:700px){
  h1{font-size:36px;}
  .card{padding:28px;}
}

</style>
</head>

<body>

<div class="auras"></div>
<div class="orb one"></div>
<div class="orb two"></div>

<div class="glow" id="glow"></div>

<div class="card">
  <h1>Support my work</h1>

  <p class="subtitle">
    Building ideas, larping not mine clips. Your support keeps everything alive.
  </p>

  <div class="wallet">
    <div class="label">Bitcoin Address</div>

    <div class="address" id="btc">
      bc1qu0zvcnft5m9tg0wvpy2f9nhr6es5vue2xdpehl
    </div>

    <div class="buttons">
      <button class="copy" onclick="copyBTC()">Copy</button>
      <a class="pay" href="bitcoin:bc1qu0zvcnft5m9tg0wvpy2f9nhr6es5vue2xdpehl">
        Open Wallet
      </a>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied ✔</div>

<script>
function copyBTC(){
  const addr = document.getElementById("btc").innerText;
  navigator.clipboard.writeText(addr);
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1600);
}

/* cursor light */
const glow = document.getElementById("glow");
window.addEventListener("mousemove",(e)=>{
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
